<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia Automation</title>
  <link rel="icon" href="images/NyXia-FavIcon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/nyxia.css">
</head>
<body class="dark">
  <div class="nx-cosmic-bg"></div>
  <div style="min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:10;">

    <div style="display:flex;flex:1;">

      <!-- Sidebar -->
      <aside class="nx-sidebar">
        <div class="nx-sidebar-header">
          <img src="images/Logo.png" alt="NyXia" style="height:32px;">
          <div>
            <span style="font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--nx-t);">NyXia</span>
            <span style="display:block;font-size:0.7rem;color:var(--nx-t4);">Automation</span>
          </div>
        </div>
        <nav class="nx-sidebar-nav">
          <a href="dashboard.html" class="nx-sidebar-item">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </span>
            Tableau de bord
          </a>
          <a href="nouvelle-publication.html" class="nx-sidebar-item nx-active">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            </span>
            Nouvelle publication
          </a>
          <a href="mes-publications.html" class="nx-sidebar-item">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </span>
            Mes publications
          </a>
          <a href="mes-comptes.html" class="nx-sidebar-item">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
            Mes comptes
          </a>
          <a href="parametres.html" class="nx-sidebar-item">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </span>
            Paramètres
          </a>
        </nav>
        <div class="nx-sidebar-footer">
          <a href="login.html" class="nx-sidebar-item" style="color:var(--nx-red);">
            <span class="nx-sidebar-item-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </span>
            Déconnexion
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="nx-main-content" style="padding:32px;">

        <div style="max-width:720px;">
          <h1 style="font-size:1.8rem;margin:0 0 4px;">Nouvelle publication</h1>
          <p style="color:var(--nx-t3);font-size:0.9rem;margin:0 0 32px;">Créez et planifiez une nouvelle publication pour vos réseaux sociaux.</p>

          <form style="display:flex;flex-direction:column;gap:28px;" onsubmit="event.preventDefault();">

            <!-- Plateformes -->
            <div>
              <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;">Plateformes</label>
              <div style="display:flex;flex-wrap:wrap;gap:16px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--nx-t2);font-size:0.92rem;">
                  <input type="checkbox" class="nx-checkbox" checked> Facebook
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--nx-t2);font-size:0.92rem;">
                  <input type="checkbox" class="nx-checkbox" checked> Instagram
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--nx-t2);font-size:0.92rem;">
                  <input type="checkbox" class="nx-checkbox"> TikTok
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--nx-t2);font-size:0.92rem;">
                  <input type="checkbox" class="nx-checkbox"> YouTube
                </label>
              </div>
            </div>

            <!-- Sujet -->
            <div>
              <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Sujet de la publication</label>
              <input type="text" class="nx-input" placeholder="Ex : Lancement de notre nouveau service...">
            </div>

            <!-- Description -->
            <div>
              <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Description / Instructions</label>
              <textarea class="nx-textarea" rows="5" placeholder="Décrivez le contenu souhaité, le message clé, les hashtags à inclure..."></textarea>
            </div>

            <!-- Ton -->
            <div>
              <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;">Ton de la publication</label>
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                <button type="button" class="nx-btn-secondary" style="padding:8px 18px;font-size:0.85rem;">Professionnel</button>
                <button type="button" class="nx-btn-secondary" style="padding:8px 18px;font-size:0.85rem;border-color:var(--nx-p);color:var(--nx-p3);background:rgba(123,92,255,0.08);">Décontracté</button>
                <button type="button" class="nx-btn-secondary" style="padding:8px 18px;font-size:0.85rem;">Inspirant</button>
                <button type="button" class="nx-btn-secondary" style="padding:8px 18px;font-size:0.85rem;">Humoristique</button>
                <button type="button" class="nx-btn-secondary" style="padding:8px 18px;font-size:0.85rem;">Éducatif</button>
              </div>
            </div>

            <!-- Programmation -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div>
                <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Date</label>
                <input type="date" class="nx-input">
              </div>
              <div>
                <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Heure</label>
                <input type="time" class="nx-input">
              </div>
            </div>

            <!-- Submit -->
            <div style="display:flex;gap:12px;margin-top:8px;">
              <button type="submit" class="nx-btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                Programmer la publication
              </button>
              <button type="button" class="nx-btn-secondary">
                Enregistrer comme brouillon
              </button>
            </div>

          </form>
        </div>

      </main>
    </div>

    <footer style="margin-top:auto;padding:40px 24px;border-top:1px solid rgba(123,92,255,0.08);">
      <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:32px;align-items:center;justify-content:space-between;">
        <div>
          <img src="images/Logo.png" alt="NyXia" style="height:32px;margin-bottom:8px;">
          <p style="color:var(--nx-t3);font-size:0.85rem;">NyXia en automatique travail pour toi !</p>
        </div>
        <p style="color:var(--nx-t4);font-size:0.8rem;">© 2025 NyXia Automation. Tous droits réservés.</p>
      </div>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
