<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyXia Automation</title>
  <link rel="icon" href="images/NyXia-FavIcon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/nyxia.css">
</head>
<body class="dark">
  <div class="nx-cosmic-bg"></div>
  <div style="min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:10;">

    <!-- Login Card -->
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div class="nx-glass" style="width:100%;max-width:420px;padding:40px 36px;animation:nx-fade-up 0.6s ease-out both;">

        <!-- Logo -->
        <div style="text-align:center;margin-bottom:32px;">
          <img src="images/Logo.png" alt="NyXia" style="height:48px;margin-bottom:12px;">
          <h1 style="font-family:var(--font-heading);font-size:1.8rem;color:var(--nx-t);margin:0 0 4px;">Bienvenue</h1>
          <p style="color:var(--nx-t3);font-size:0.9rem;">Connectez-vous à votre espace NyXia</p>
        </div>

        <!-- Form -->
        <form style="display:flex;flex-direction:column;gap:16px;" onsubmit="event.preventDefault();">

          <!-- Email -->
          <div>
            <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Adresse e-mail</label>
            <input type="email" class="nx-input" placeholder="vous@exemple.com" autocomplete="email">
          </div>

          <!-- Password -->
          <div>
            <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--nx-t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Mot de passe</label>
            <input type="password" class="nx-input" placeholder="••••••••" autocomplete="current-password">
          </div>

          <!-- Forgot -->
          <div style="text-align:right;">
            <a href="#" style="font-size:0.82rem;color:var(--nx-p3);">Mot de passe oublié ?</a>
          </div>

          <!-- Login Button -->
          <button type="submit" class="nx-btn-primary" style="width:100%;margin-top:4px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Se connecter
          </button>
        </form>

        <!-- Divider -->
        <div style="display:flex;align-items:center;gap:16px;margin:24px 0;">
          <div style="flex:1;height:1px;background:var(--nx-glass-border);"></div>
          <span style="color:var(--nx-t4);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;">ou</span>
          <div style="flex:1;height:1px;background:var(--nx-glass-border);"></div>
        </div>

        <!-- Google Sign-in -->
        <button class="nx-btn-secondary" style="width:100%;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuer avec Google
        </button>

        <!-- Sign Up Link -->
        <p style="text-align:center;margin-top:24px;font-size:0.88rem;color:var(--nx-t3);">
          Pas encore de compte ?
          <a href="dashboard.html" style="color:var(--nx-p3);font-weight:600;">Créer un compte</a>
        </p>

      </div>
    </div>

    <footer style="margin-top:auto;padding:40px 24px;border-top:1px solid rgba(123,92,255,0.08);">
      <div style="max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:32px;align-items:center;justify-content:space-between;">
        <div>
          <img src="images/Logo.png" alt="NyXia" style="height:32px;margin-bottom:8px;">
          <p style="color:var(--nx-t3);font-size:0.85rem;">NyXia en automatique travail pour toi !</p>
        </div>
        <p style="color:var(--nx-t4);font-size:0.8rem;">© 2025 NyXia Automation. Tous droits réservés.</p>
      </div>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
